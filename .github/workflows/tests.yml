name: Tests

on:
  pull_request:
    branches: [ master ]

  schedule:
    - cron: '0 8 * * 1-5'

  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - all

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Run Ruff linter
        run: uv run ruff check .

      - name: Run Ruff formatter check
        run: uv run ruff format --check .

  smoke-tests:
    runs-on: ubuntu-latest
    needs: [ lint ]
    timeout-minutes: 20

    if: >
      always() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (
        github.event_name == 'pull_request' ||
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' &&
        (inputs.test_suite == 'smoke' || inputs.test_suite == 'all'))
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-playwright: 'true'

      - name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          BASE_APP_URL: ${{ secrets.BASE_APP_URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: uv run pytest -m smoke --ignore=tests/web/selenium

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-results
          path: test_result/allure-results/
          retention-days: 14

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-traces
          path: test_result/traces/
          retention-days: 14

  regression-tests:
    runs-on: ubuntu-latest
    needs: smoke-tests
    timeout-minutes: 20

    if: >
      always() &&
      github.event_name == 'workflow_dispatch' &&
      (inputs.test_suite == 'regression' || inputs.test_suite == 'all') &&
      (needs.smoke-tests.result == 'success' || needs.smoke-tests.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-playwright: 'true'

      - name: Run regression tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          BASE_APP_URL: ${{ secrets.BASE_APP_URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: uv run pytest -m regression --ignore=tests/web/selenium

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-allure-results
          path: test_result/allure-results/
          retention-days: 14

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-traces
          path: test_result/traces/
          retention-days: 14

  publish-report:
    runs-on: ubuntu-latest
    needs: [ smoke-tests, regression-tests ]
    if: always() && needs.smoke-tests.result != 'skipped'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download smoke Allure results
        if: needs.smoke-tests.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: smoke-allure-results
          path: allure-results/smoke

      - name: Download regression Allure results
        if: needs.regression-tests.result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: regression-allure-results
          path: allure-results/regression

      - name: Install Allure CLI
        run: npm install -g allure-commandline@2.42.1

      - name: Generate smoke Allure report
        if: needs.smoke-tests.result != 'skipped'
        run: allure generate allure-results/smoke -o pages/allure/smoke --clean

      - name: Generate regression Allure report
        if: needs.regression-tests.result != 'skipped'
        run: allure generate allure-results/regression -o pages/allure/regression --clean

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add report links to summary
        run: |
          echo "## Test Reports" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.smoke-tests.result }}" != "skipped" ]; then
            echo "- [Smoke Tests](${{ steps.deployment.outputs.page_url }}allure/smoke/)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.regression-tests.result }}" != "skipped" ]; then
            echo "- [Regression Tests](${{ steps.deployment.outputs.page_url }}allure/regression/)" >> $GITHUB_STEP_SUMMARY
          fi
