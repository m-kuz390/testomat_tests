name: Tests

on:
  pull_request:
    branches: [ master ]

  schedule:
    - cron: '0 8 * * 1-5'

  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - all

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Run Ruff linter
        run: uv run ruff check .

      - name: Run Ruff formatter check
        run: uv run ruff format --check .

  smoke-tests:
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
      (inputs.test_suite == 'smoke' || inputs.test_suite == 'all'))

    steps:
      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-playwright: 'true'

      - name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          BASE_APP_URL: ${{ secrets.BASE_APP_URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: uv run pytest -m smoke --ignore=tests/web/selenium

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-html-report
          path: test_result/report.html
          retention-days: 14

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-traces
          path: test_result/traces/
          retention-days: 14

  regression-tests:
    runs-on: ubuntu-latest
    needs: smoke-tests

    if: >
      always() &&
      github.event_name == 'workflow_dispatch' &&
      (inputs.test_suite == 'regression' || inputs.test_suite == 'all') &&
      (needs.smoke-tests.result == 'success' || needs.smoke-tests.result == 'skipped')

    steps:
      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-playwright: 'true'

      - name: Run regression tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          BASE_APP_URL: ${{ secrets.BASE_APP_URL }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: uv run pytest -m regression --ignore=tests/web/selenium

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-html-report
          path: test_result/report.html
          retention-days: 14

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-traces
          path: test_result/traces/
          retention-days: 14
